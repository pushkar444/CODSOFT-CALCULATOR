<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <meta name="description" content="A minimal calculator built with HTML, CSS and JavaScript." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="stage">
    <section class="calc" role="application" aria-label="Calculator">
      <header class="calc-head">
        <h1>Calculator</h1>
        <p>Use your mouse or keyboard.</p>
      </header>

      <!-- Display: the small line shows the running expression, the big line the value -->
      <div class="display">
        <div class="expr" id="expr">&nbsp;</div>
        <div class="value" id="value">0</div>
      </div>

      <!-- Keypad. data-* attributes are read by the JS so the markup stays clean. -->
      <div class="keys">
        <button class="key key-fn" data-action="clear">AC</button>
        <button class="key key-fn" data-action="back" aria-label="Backspace">&#9003;</button>
        <button class="key key-fn" data-action="percent">%</button>
        <button class="key key-op" data-op="/">&divide;</button>

        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key key-op" data-op="*">&times;</button>

        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key key-op" data-op="-">&minus;</button>

        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key key-op" data-op="+">+</button>

        <button class="key key-zero" data-num="0">0</button>
        <button class="key" data-num=".">.</button>
        <button class="key key-eq" data-action="equals">=</button>
      </div>
    </section>
  </main>

  <script src="js/calculator.js"></script>
</body>
</html>
